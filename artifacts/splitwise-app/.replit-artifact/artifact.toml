kind = "mobile"
previewPath = "/"
title = "Hisab Kitab"
version = "1.0.0"
id = "artifacts/splitwise-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24032

[services.development]
run = "PORT=24032 pnpm --filter @workspace/splitwise-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/splitwise-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/splitwise-app", "run", "serve" ]

[services.env]
PORT = "24032"
BASE_PATH = "/"
